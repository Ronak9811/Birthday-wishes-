<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Top Secret Birthday Access</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --gold: #FFD700;
    --dark: #0a0a0a;
    --cream: #f5f0e8;
    --red: #e63946;
    --green: #2dc653;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--dark); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }

  /* ========== PAGE SYSTEM ========== */
  .page { display: none; min-height: 100vh; }
  .page.active { display: flex; }

  /* ========== PAGE 1: LOGIN ========== */
  #page-login {
    background: var(--dark);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }
  #page-login::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 20% 50%, rgba(255,215,0,0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(230,57,70,0.05) 0%, transparent 50%);
    pointer-events: none;
  }
  .scanlines {
    position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
    pointer-events: none; z-index: 1;
  }
  .login-container {
    position: relative; z-index: 2;
    width: 100%; max-width: 480px;
    border: 1px solid rgba(255,215,0,0.3);
    padding: 40px 36px;
    background: rgba(255,255,255,0.02);
    backdrop-filter: blur(10px);
    animation: fadeInDown 0.8s ease both;
  }
  @keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .login-badge {
    display: inline-block;
    background: var(--gold);
    color: var(--dark);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    padding: 4px 12px;
    margin-bottom: 20px;
  }
  .login-title {
    font-family: 'Playfair Display', serif;
    color: var(--cream);
    font-size: clamp(24px, 5vw, 34px);
    line-height: 1.1;
    margin-bottom: 6px;
  }
  .login-subtitle {
    color: rgba(245,240,232,0.4);
    font-size: 13px;
    margin-bottom: 32px;
    letter-spacing: 0.5px;
  }
  .field-group { margin-bottom: 16px; }
  .field-group label {
    display: block;
    color: rgba(255,215,0,0.7);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
  }
  .field-group input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,215,0,0.2);
    color: var(--cream);
    padding: 12px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.3s;
  }
  .field-group input:focus { border-color: var(--gold); }
  .field-group input::placeholder { color: rgba(245,240,232,0.2); }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .login-btn {
    width: 100%;
    margin-top: 24px;
    background: var(--gold);
    color: var(--dark);
    border: none;
    padding: 16px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .login-btn:hover { background: #ffe840; transform: translateY(-1px); }
  .login-btn:active { transform: translateY(0); }
  .error-msg {
    color: var(--red);
    font-size: 12px;
    margin-top: 12px;
    text-align: center;
    min-height: 18px;
    font-style: italic;
  }

  /* Loading overlay */
  #loading-overlay {
    display: none;
    position: fixed; inset: 0;
    background: var(--dark);
    z-index: 999;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  #loading-overlay.show { display: flex; }
  .loading-text {
    font-family: 'Bebas Neue', sans-serif;
    color: var(--gold);
    font-size: 22px;
    letter-spacing: 4px;
    margin-bottom: 30px;
    animation: pulse 1s ease infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .progress-bar-wrap {
    width: 300px;
    height: 3px;
    background: rgba(255,215,0,0.15);
    position: relative;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--gold);
    width: 0%;
    transition: width 0.1s linear;
  }
  .loading-step {
    color: rgba(245,240,232,0.4);
    font-size: 11px;
    letter-spacing: 2px;
    margin-top: 16px;
    font-family: 'Bebas Neue', sans-serif;
  }

  /* ========== PAGE 2: FLAPPY BIRD ========== */
  #page-game {
    background: #1a1a2e;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
  }
  .game-header {
    font-family: 'Bebas Neue', sans-serif;
    color: var(--gold);
    font-size: clamp(28px, 6vw, 48px);
    letter-spacing: 4px;
    text-align: center;
    margin-bottom: 8px;
  }
  .game-subtitle {
    color: rgba(245,240,232,0.4);
    font-size: 13px;
    text-align: center;
    margin-bottom: 24px;
  }
  #gameCanvas {
    display: block;
    border: 2px solid rgba(255,215,0,0.4);
    cursor: pointer;
    max-width: 100%;
  }
  .game-controls {
    margin-top: 16px;
    display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
  }
  .game-btn {
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    padding: 10px 28px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .game-btn:hover { background: var(--gold); color: var(--dark); }
  .next-btn-game {
    background: var(--gold);
    border: 1px solid var(--gold);
    color: var(--dark);
    padding: 10px 28px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .next-btn-game:hover { background: #ffe840; }

  /* ========== PAGE 3: FINALE ========== */
  #page-finale {
    background: var(--dark);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    position: relative;
    overflow: hidden;
    text-align: center;
  }
  .confetti-wrap {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
  }
  .confetti-piece {
    position: absolute;
    width: 10px; height: 14px;
    top: -20px;
    animation: confettiFall linear infinite;
    border-radius: 2px;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0.3; }
  }
  .finale-content { position: relative; z-index: 2; max-width: 600px; }
  .finale-badge {
    display: inline-block;
    background: var(--gold);
    color: var(--dark);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 3px;
    padding: 5px 18px;
    margin-bottom: 28px;
    animation: fadeInDown 1s ease both;
  }
  .finale-photo-wrap {
    width: 220px; height: 220px;
    border-radius: 50%;
    border: 4px solid var(--gold);
    overflow: hidden;
    margin: 0 auto 32px;
    position: relative;
    animation: fadeInDown 1s 0.2s ease both;
    opacity: 0;
    animation-fill-mode: both;
    box-shadow: 0 0 40px rgba(255,215,0,0.3);
  }
  .finale-photo-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .photo-placeholder {
    width: 100%; height: 100%;
    background: linear-gradient(135deg, #1a1a2e, #2d2d44);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: rgba(255,215,0,0.5);
    font-size: 48px;
  }
  .photo-placeholder span {
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    letter-spacing: 2px;
    margin-top: 8px;
    color: rgba(255,215,0,0.3);
  }
  .finale-name {
    font-family: 'Playfair Display', serif;
    color: var(--cream);
    font-size: clamp(32px, 7vw, 56px);
    line-height: 1.1;
    margin-bottom: 16px;
    animation: fadeInDown 1s 0.4s ease both;
    opacity: 0;
    animation-fill-mode: both;
  }
  .finale-msg {
    color: rgba(245,240,232,0.6);
    font-size: 16px;
    line-height: 1.7;
    margin-bottom: 32px;
    animation: fadeInDown 1s 0.6s ease both;
    opacity: 0;
    animation-fill-mode: both;
  }
  .finale-gold-line {
    width: 80px; height: 2px;
    background: var(--gold);
    margin: 0 auto 32px;
    animation: fadeInDown 1s 0.8s ease both;
    opacity: 0;
    animation-fill-mode: both;
  }
  .music-btn {
    background: transparent;
    border: 2px solid var(--gold);
    color: var(--gold);
    padding: 14px 36px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.3s;
    animation: fadeInDown 1s 1s ease both;
    opacity: 0;
    animation-fill-mode: both;
  }
  .music-btn:hover { background: var(--gold); color: var(--dark); }
  .music-note {
    font-size: 28px;
    animation: spin 3s linear infinite;
    display: inline-block;
  }
  @keyframes spin { from{transform:rotate(-10deg)} to{transform:rotate(10deg)} }
  .age-reveal {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(80px, 20vw, 160px);
    color: rgba(255,215,0,0.08);
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 1;
    letter-spacing: -5px;
  }

  /* ========== PAGE 0: DARK INTRO ========== */
  #page-dark {
    background: #000;
    align-items: flex-end;
    justify-content: center;
    min-height: 100vh;
    padding-bottom: 48px;
  }
  .dark-intro {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    width: 100%;
  }
  .light-box {
    border: 1px solid rgba(255,255,255,0.18);
    padding: 10px 24px;
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    transition: all 0.3s;
    animation: breathe 2.5s ease infinite;
  }
  .light-box:hover {
    border-color: rgba(255,255,255,0.45);
    background: rgba(255,255,255,0.04);
  }
  @keyframes breathe {
    0%,100% { box-shadow: 0 0 8px rgba(255,255,255,0.04); }
    50% { box-shadow: 0 0 18px rgba(255,255,255,0.12); }
  }
  .light-icon { font-size: 18px; }
  .light-text {
    color: rgba(255,255,255,0.5);
    font-family: "Bebas Neue", sans-serif;
    font-size: 13px;
    letter-spacing: 3px;
  }

  /* ========== PAGE 0.5: SPLIT CHOICE ========== */
  #page-light {
    padding: 0;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  .split-screen {
    display: flex;
    width: 100vw;
    height: 100vh;
    position: relative;
    overflow: hidden;
  }

  /* Global header floats above both panels */
  .split-global-header {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    pointer-events: none;
    gap: 10px;
  }
  .split-global-title {
    font-family: "Playfair Display", serif;
    font-size: clamp(14px, 2.8vw, 26px);
    font-weight: 400;
    letter-spacing: 8px;
    margin-bottom: 0;
    /* two-tone: left half white on black, right half black on cream */
    background: linear-gradient(to right, #f0ece4 50%, #0f0f0f 50%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    white-space: nowrap;
  }
  .split-global-line {
    width: 48px; height: 1px;
    background: #c9a96e;
  }

  /* Panels */
  .split-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 88px 20px 20px;
    height: 100vh;
    overflow: hidden;
    box-sizing: border-box;
  }
  .split-black { background: #0f0f0f; }
  .split-white { background: #f0ece4; }

  /* Cards — scale to fill available space */
  .choice-card {
    width: 100%;
    max-width: 320px;
    border-radius: 14px;
    padding: 20px 22px 18px;
    display: flex;
    flex-direction: column;
    box-sizing: border-box;
  }
  .card-black {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
  }
  .card-white {
    background: rgba(255,255,255,0.65);
    border: 1px solid rgba(0,0,0,0.08);
    box-shadow: 0 2px 30px rgba(0,0,0,0.06);
  }

  /* I GOT label */
  .card-label {
    font-family: "DM Sans", sans-serif;
    font-size: 10px;
    letter-spacing: 5px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 2px;
    font-weight: 300;
  }
  .card-label-dark { color: rgba(15,10,5,0.5); }

  /* BLACK / WHITE heading */
  .card-title {
    font-family: "Playfair Display", serif;
    font-size: clamp(36px, 6vw, 58px);
    font-weight: 700;
    line-height: 1;
    margin-bottom: 12px;
    letter-spacing: 2px;
  }
  .card-title-black { color: #ffffff; }
  .card-title-white { color: #0f0f0f; }

  /* Gold underline */
  .card-gold-line {
    width: 32px; height: 1.5px;
    background: #c9a96e;
    margin-bottom: 16px;
  }

  /* Feature list */
  .card-features {
    list-style: none;
    margin-bottom: 18px;
    flex: 1;
  }
  .card-features li {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    font-family: "DM Sans", sans-serif;
    font-size: clamp(11px, 1.4vw, 14px);
    color: rgba(255,255,255,0.75);
    font-weight: 300;
    letter-spacing: 0.2px;
  }
  .card-features li:last-child { border-bottom: none; }
  .card-features-dark li {
    border-bottom: 1px solid rgba(0,0,0,0.08);
    color: rgba(15,10,5,0.75);
  }
  .card-features-dark li:last-child { border-bottom: none; }
  .feat-icon { font-size: 17px; min-width: 24px; text-align: center; }

  /* Buttons */
  .choose-btn {
    width: 100%;
    padding: 13px 16px;
    font-family: "DM Sans", sans-serif;
    font-size: 10px;
    letter-spacing: 3px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-radius: 2px;
  }
  .choose-btn-black {
    background: transparent;
    color: rgba(255,255,255,0.8);
    border: 1px solid rgba(201,169,110,0.6);
  }
  .choose-btn-black:hover { background: rgba(201,169,110,0.1); color: #fff; border-color: #c9a96e; }
  .choose-btn-white {
    background: transparent;
    color: rgba(15,10,5,0.75);
    border: 1px solid rgba(15,10,5,0.3);
  }
  .choose-btn-white:hover { background: rgba(0,0,0,0.04); color: #0f0f0f; }

  /* White result page */
  #page-white-result {
    background: #0a1628;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  .white-result-content { text-align: center; animation: fadeInDown 0.6s ease both; }
  .white-emoji { font-size: 80px; margin-bottom: 20px; }
  .white-result-title {
    font-family: "DM Sans", sans-serif;
    color: #1a1208;
    font-size: 64px;
    font-weight: 900;
    margin-bottom: 12px;
  }
  .white-result-msg {
    color: rgba(30,20,10,0.5);
    font-size: 22px;
    font-style: italic;
  }

  /* ========== PHOTO MODAL ========== */
  .photo-modal {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(6px);
  }
  .photo-modal.show { display: flex; }
  .modal-inner {
    max-width: 480px;
    width: 90%;
    text-align: center;
    animation: fadeInDown 0.4s ease both;
  }
  .modal-inner img {
    width: 100%;
    border-radius: 4px;
    border: 3px solid var(--gold);
    display: block;
  }
  .modal-caption {
    color: var(--gold);
    font-family: "Bebas Neue", sans-serif;
    font-size: 20px;
    letter-spacing: 3px;
    margin: 20px 0 16px;
  }
  .modal-next {
    background: var(--gold);
    color: var(--dark);
    border: none;
    padding: 14px 40px;
    font-family: "Bebas Neue", sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 2px;
  }
  .modal-next:hover { background: #ffe840; }

</style>
</head>
<body>

<!-- LOADING OVERLAY -->
<div id="loading-overlay">
  <div class="loading-text" id="loadingText">VERIFYING IDENTITY...</div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressFill"></div>
  </div>
  <div class="loading-step" id="loadingStep">CROSS-REFERENCING DATABASE</div>
</div>


  <!-- PAGE 0: DARK INTRO -->
  <div class="page active" id="page-dark">
    <div class="dark-intro">
      <div class="light-box" id="lightBox" onclick="turnOnLight()">
        <span class="light-icon">💡</span>
        <span class="light-text">TURN ON LIGHT</span>
      </div>
    </div>
  </div>

  <!-- PAGE 0.5: LIGHT REVEAL -->
  <div class="page" id="page-light">
    <div class="split-screen">

      <!-- HEADER centered across both panels -->
      <div class="split-global-header">
        <div class="split-global-title">WHAT YOU WANT ?</div>
        <div class="split-global-line"></div>
      </div>

      <!-- LEFT: BLACK -->
      <div class="split-panel split-black">
        <div class="choice-card card-black">
          <div class="card-label">I GOT</div>
          <div class="card-title card-title-black">BLACK</div>
          <div class="card-gold-line"></div>
          <ul class="card-features">
            <li><span class="feat-icon">🌡️</span><span>Absorb heat five times faster</span></li>
            <li><span class="feat-icon">🌍</span><span>Save global warming</span></li>
            <li><span class="feat-icon">💧</span><span>Water efficient</span></li>
            <li><span class="feat-icon">🌙</span><span>Nightmare for night itself</span></li>
          </ul>
          <button class="choose-btn choose-btn-black" onclick="showColourPhoto()">CHOOSE BLACK &nbsp;&nbsp;→</button>
        </div>
      </div>

      <!-- RIGHT: WHITE -->
      <div class="split-panel split-white">
        <div class="choice-card card-white">
          <div class="card-label card-label-dark">I GOT</div>
          <div class="card-title card-title-white">WHITE</div>
          <div class="card-gold-line"></div>
          <ul class="card-features card-features-dark">
            <li><span class="feat-icon">🎓</span><span>Topper</span></li>
            <li><span class="feat-icon">💪</span><span>Bodybuilder</span></li>
            <li><span class="feat-icon">🏃</span><span>Sportsman</span></li>
            <li><span class="feat-icon">🎯</span><span>Discipline</span></li>
          </ul>
          <button class="choose-btn choose-btn-white" onclick="showWhiteResult()">CHOOSE WHITE &nbsp;&nbsp;→</button>
        </div>
      </div>

    </div>
  </div>

  <!-- Photo Modal -->
